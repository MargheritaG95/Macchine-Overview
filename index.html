<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Controllo Veicoli</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f2f0eb;
      color: #1d1d1d;
    }

    button,
    input {
      font: inherit;
    }

    .page {
      width: min(1100px, calc(100% - 30px));
      margin: 0 auto;
      padding: 35px 0 60px;
    }

    .hero {
      padding: 35px;
      background: #171717;
      color: #ffffff;
      border-radius: 22px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.18);
    }

    .brand {
      margin: 0 0 8px;
      color: #c9a45b;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 58px);
    }

    .description {
      margin: 15px 0 0;
      color: #d5d5d5;
      line-height: 1.5;
    }

    .search-container {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 28px;
    }

    .search-input {
      width: 100%;
      min-height: 62px;
      padding: 0 20px;
      border: 2px solid transparent;
      border-radius: 14px;
      outline: none;
      font-size: 19px;
    }

    .search-input:focus {
      border-color: #b38b3d;
    }

    .search-button {
      min-width: 145px;
      min-height: 62px;
      padding: 0 25px;
      border: 0;
      border-radius: 14px;
      background: #b38b3d;
      color: #ffffff;
      font-weight: bold;
      cursor: pointer;
    }

    .search-button:hover {
      background: #9e782f;
    }

    .search-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      min-height: 20px;
      margin-top: 12px;
      color: #d5d5d5;
      font-size: 14px;
    }

    .message.error {
      color: #ffaaa5;
    }

    .message.success {
      color: #a9e8bb;
    }

    .section {
      margin-top: 35px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 15px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
    }

    .vehicle-count {
      color: #777777;
      font-size: 14px;
    }

    .table-wrapper {
      overflow-x: auto;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.07);
    }

    table {
      width: 100%;
      min-width: 950px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 15px 17px;
      border-bottom: 1px solid #e8e4dc;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f6f3ed;
      color: #555555;
      font-size: 12px;
      text-transform: uppercase;
    }

    tbody tr:hover {
      background: #faf8f4;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .vehicle-name-button {
      padding: 0;
      border: 0;
      background: transparent;
      color: #1d1d1d;
      font-weight: bold;
      text-align: left;
      text-decoration: underline;
      text-decoration-color: #b38b3d;
      text-underline-offset: 4px;
      cursor: pointer;
    }

    .date-text {
      font-size: 13px;
      font-weight: bold;
      white-space: nowrap;
    }

    .date-text.green {
      color: #17833c;
    }

    .date-text.yellow {
      color: #d27a00;
    }

    .date-text.red {
      color: #c62828;
    }

    .date-text.neutral {
      color: #777777;
    }

    .status-pill {
      display: inline-block;
      padding: 7px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .status-pill.green {
      background: #dff3e5;
      color: #176332;
    }

    .status-pill.yellow {
      background: #fff0b8;
      color: #775500;
    }

    .status-pill.red {
      background: #ffd9d6;
      color: #91231e;
    }

    .status-pill.neutral {
      background: #eeeeee;
      color: #555555;
    }

    .empty-row {
      padding: 30px;
      color: #777777;
      text-align: center;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      position: relative;
      width: min(680px, 100%);
      max-height: 88vh;
      overflow-y: auto;
      overflow-x: hidden;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 25px 75px rgba(0, 0, 0, 0.4);
    }

    .modal.green-popup {
      background: #eff8f1;
      border: 4px solid #3d9158;
    }

    .modal.yellow-popup {
      background: #fff9e5;
      border: 4px solid #d49a18;
    }

    .modal.red-popup {
      background: #fff0ef;
      border: 4px solid #c94c45;
    }

    .modal.neutral-popup {
      background: #f2f2f2;
      border: 4px solid #888888;
    }

    .vehicle-popup-header {
      position: relative;
      padding: 32px 70px 28px 30px;
      color: #ffffff;
    }

    .green-popup .vehicle-popup-header {
      background: linear-gradient(135deg, #246b3a, #3d9158);
    }

    .yellow-popup .vehicle-popup-header {
      background: linear-gradient(135deg, #b66a00, #df9b25);
    }

    .red-popup .vehicle-popup-header {
      background: linear-gradient(135deg, #8f2823, #c94c45);
    }

    .neutral-popup .vehicle-popup-header {
      background: linear-gradient(135deg, #555555, #888888);
    }

    .vehicle-popup-header h2 {
      margin: 0;
      font-size: 30px;
    }

    .vehicle-popup-subtitle {
      margin: 7px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .vehicle-status-summary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 9px 14px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      font-size: 13px;
      font-weight: bold;
    }

    .status-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      font-size: 14px;
    }

    .modal-header {
      padding: 28px 65px 22px 28px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 28px;
    }

    .modal-header p {
      margin: 10px 0 0;
    }

    .modal-body {
      padding: 24px 28px 30px;
    }

    .close-button {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 5;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      color: #ffffff;
      font-size: 25px;
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .close-button:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-row {
      display: block;
      padding: 16px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.88);
    }

    .detail-label {
      margin-bottom: 7px;
      color: #777777;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .detail-value {
      color: #1d1d1d;
      font-size: 16px;
      font-weight: bold;
      overflow-wrap: anywhere;
    }

    .date-note {
      display: block;
      margin-top: 7px;
      font-size: 12px;
      font-weight: bold;
      line-height: 1.4;
    }

    .date-note.green {
      color: #17833c;
    }

    .date-note.yellow {
      color: #d27a00;
    }

    .date-note.red {
      color: #c62828;
    }

    .date-note.neutral {
      color: #777777;
    }

    .choice-list {
      display: grid;
      gap: 10px;
    }

    .choice-button {
      width: 100%;
      padding: 16px;
      border: 1px solid #d7d2c9;
      border-radius: 14px;
      background: #ffffff;
      text-align: left;
      cursor: pointer;
    }

    .choice-button:hover {
      border-color: #b38b3d;
      background: #fbf7ed;
    }

    .choice-name {
      display: block;
      font-size: 17px;
      font-weight: bold;
    }

    .choice-plate {
      display: block;
      margin-top: 5px;
      color: #666666;
      font-size: 14px;
    }

    @media (max-width: 650px) {
      .page {
        width: calc(100% - 20px);
        padding-top: 10px;
      }

      .hero {
        padding: 25px 18px;
        border-radius: 18px;
      }

      .search-container {
        grid-template-columns: 1fr;
      }

      .search-button {
        width: 100%;
      }

      .section-title {
        align-items: start;
        flex-direction: column;
        gap: 5px;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .vehicle-popup-header {
        padding: 28px 60px 24px 22px;
      }

      .vehicle-popup-header h2 {
        font-size: 25px;
      }

      .modal-body {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <section class="hero">

      <p class="brand">Cambio Manuale</p>

      <h1>Controllo veicoli</h1>

      <p class="description">
        Cerca una vettura per nome o targa.
        Puoi inserire anche una parte del nome, per esempio “Abarth”.
      </p>

      <div class="search-container">

        <input
          id="searchInput"
          class="search-input"
          type="search"
          placeholder="Cerca per nome o targa..."
          autocomplete="off"
        >

        <button
          id="searchButton"
          class="search-button"
          type="button"
          disabled
        >
          Cerca
        </button>

      </div>

      <div id="message" class="message">
        Caricamento veicoli...
      </div>

    </section>

    <section class="section">

      <div class="section-title">

        <h2>Lista veicoli</h2>

        <span
          id="vehicleCount"
          class="vehicle-count"
        ></span>

      </div>

      <div class="table-wrapper">

        <table>

          <thead>
            <tr>
              <th>Nome</th>
              <th>Targa</th>
              <th>Assicurazione</th>
              <th>Revisione</th>
              <th>Documento</th>
              <th>Area B &amp; C</th>
              <th>Stato</th>
            </tr>
          </thead>

          <tbody id="vehicleTableBody">
            <tr>
              <td colspan="7" class="empty-row">
                Caricamento dati...
              </td>
            </tr>
          </tbody>

        </table>

      </div>

    </section>

  </main>

  <div
    id="modalOverlay"
    class="modal-overlay"
  >

    <div
      id="modalContainer"
      class="modal"
    >

      <button
        id="closeModalButton"
        class="close-button"
        type="button"
        aria-label="Chiudi"
      >
        ×
      </button>

      <div id="modalContent"></div>

    </div>

  </div>

  <script>
    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vT8TlSxIhvznxeUk6AUEDFHQcChXbhUnUYYxU3Ghz5eYr8kIZrDID4EsYl4jw0oWbYMjTVjjmjmec22/pub?output=csv";

    const WARNING_DAYS = 30;

    let vehicles = [];

    const searchInput =
      document.getElementById("searchInput");

    const searchButton =
      document.getElementById("searchButton");

    const message =
      document.getElementById("message");

    const vehicleCount =
      document.getElementById("vehicleCount");

    const vehicleTableBody =
      document.getElementById("vehicleTableBody");

    const modalOverlay =
      document.getElementById("modalOverlay");

    const modalContainer =
      document.getElementById("modalContainer");

    const modalContent =
      document.getElementById("modalContent");

    const closeModalButton =
      document.getElementById("closeModalButton");

    window.addEventListener(
      "load",
      loadVehicles
    );

    searchButton.addEventListener(
      "click",
      runSearch
    );

    searchInput.addEventListener(
      "keydown",
      function (event) {
        if (event.key === "Enter") {
          runSearch();
        }
      }
    );

    closeModalButton.addEventListener(
      "click",
      closeModal
    );

    modalOverlay.addEventListener(
      "click",
      function (event) {
        if (event.target === modalOverlay) {
          closeModal();
        }
      }
    );

    document.addEventListener(
      "keydown",
      function (event) {
        if (event.key === "Escape") {
          closeModal();
        }
      }
    );

    async function loadVehicles() {
      message.className = "message";
      message.textContent =
        "Caricamento veicoli...";

      searchButton.disabled = true;

      try {
        const response = await fetch(
          SHEET_CSV_URL,
          {
            cache: "no-store"
          }
        );

        if (!response.ok) {
          throw new Error(
            "Risposta Google Sheets non valida: " +
            response.status
          );
        }

        const csvText =
          await response.text();

        if (
          !csvText ||
          csvText.trim().startsWith("<!DOCTYPE") ||
          csvText.trim().startsWith("<html")
        ) {
          throw new Error(
            "Google Sheets ha restituito HTML invece del CSV."
          );
        }

        const rows =
          parseCSV(csvText);

        if (rows.length < 2) {
          throw new Error(
            "Il foglio non contiene righe di dati."
          );
        }

        const headers =
          rows[0].map(
            function (header) {
              return cleanHeader(header);
            }
          );

        vehicles = rows
          .slice(1)
          .filter(
            function (row) {
              return row.some(
                function (cell) {
                  return (
                    String(cell || "").trim() !== ""
                  );
                }
              );
            }
          )
          .map(
            function (row) {
              const vehicle = {};

              headers.forEach(
                function (header, index) {
                  vehicle[header] =
                    String(
                      row[index] || ""
                    ).trim();
                }
              );

              return vehicle;
            }
          );

        if (vehicles.length === 0) {
          throw new Error(
            "Non sono stati trovati veicoli."
          );
        }

        renderTable();

        searchButton.disabled = false;

        message.className =
          "message success";

        message.textContent =
          vehicles.length +
          " veicoli caricati.";

      } catch (error) {
        console.error(
          "Errore caricamento veicoli:",
          error
        );

        vehicles = [];

        searchButton.disabled = true;

        vehicleCount.textContent =
          "0 veicoli";

        vehicleTableBody.innerHTML = `
          <tr>
            <td colspan="7" class="empty-row">
              Impossibile caricare la lista dei veicoli.
            </td>
          </tr>
        `;

        message.className =
          "message error";

        message.textContent =
          "Errore nel caricamento dei dati. Controlla che il foglio sia pubblicato.";
      }
    }

    function renderTable() {
      vehicleTableBody.innerHTML = "";

      vehicleCount.textContent =
        vehicles.length + " veicoli";

      vehicles.forEach(
        function (vehicle, index) {
          const overallStatus =
            getOverallStatus(vehicle);

          const insuranceDate =
            getValue(
              vehicle,
              "Assicurazione"
            );

          const inspectionDate =
            getValue(
              vehicle,
              "Revisione"
            );

          const insuranceStatus =
            evaluateDate(insuranceDate);

          const inspectionStatus =
            evaluateDate(inspectionDate);

          const row =
            document.createElement("tr");

          row.innerHTML = `
            <td>
              <button
                class="vehicle-name-button"
                type="button"
                data-index="${index}"
              >
                ${escapeHTML(
                  getValue(vehicle, "Nome")
                )}
              </button>
            </td>

            <td>
              ${escapeHTML(
                getValue(vehicle, "Targa") ||
                "—"
              )}
            </td>

            <td>
              <span
                class="date-text ${insuranceStatus.level}"
              >
                ${escapeHTML(
                  insuranceDate || "—"
                )}
              </span>
            </td>

            <td>
              <span
                class="date-text ${inspectionStatus.level}"
              >
                ${escapeHTML(
                  inspectionDate || "—"
                )}
              </span>
            </td>

            <td>
              ${escapeHTML(
                getValue(
                  vehicle,
                  "Documento"
                ) || "—"
              )}
            </td>

            <td>
              ${escapeHTML(
                getAreaValue(vehicle) ||
                "—"
              )}
            </td>

            <td>
              <span
                class="status-pill ${overallStatus.level}"
              >
                ${escapeHTML(
                  overallStatus.shortLabel
                )}
              </span>
            </td>
          `;

          vehicleTableBody.appendChild(
            row
          );
        }
      );

      const buttons =
        document.querySelectorAll(
          ".vehicle-name-button"
        );

      buttons.forEach(
        function (button) {
          button.addEventListener(
            "click",
            function () {
              const index =
                Number(
                  button.dataset.index
                );

              showVehicleDetails(
                vehicles[index]
              );
            }
          );
        }
      );
    }

    function runSearch() {
      if (vehicles.length === 0) {
        showError(
          "La lista dei veicoli non è ancora disponibile."
        );

        return;
      }

      const query =
        normalizeText(
          searchInput.value
        );

      if (!query) {
        showError(
          "Scrivi il nome o la targa del veicolo."
        );

        return;
      }

      const results =
        vehicles.filter(
          function (vehicle) {
            const name =
              normalizeText(
                getValue(
                  vehicle,
                  "Nome"
                )
              );

            const plate =
              normalizeText(
                getValue(
                  vehicle,
                  "Targa"
                )
              );

            return (
              name.includes(query) ||
              plate.includes(query)
            );
          }
        );

      if (results.length === 0) {
        showError(
          "Nessun veicolo trovato."
        );

        return;
      }

      message.className =
        "message success";

      message.textContent =
        results.length === 1
          ? "1 veicolo trovato."
          : results.length +
            " veicoli trovati.";

      if (results.length === 1) {
        showVehicleDetails(
          results[0]
        );
      } else {
        showVehicleChoice(
          results
        );
      }
    }

    function showVehicleChoice(results) {
      modalContainer.className =
        "modal";

      closeModalButton.style.color =
        "#1d1d1d";

      closeModalButton.style.background =
        "rgba(0, 0, 0, 0.1)";

      modalContent.innerHTML = `
        <div class="modal-header">
          <h2>Scegli il veicolo</h2>

          <p>
            Sono stati trovati più risultati.
          </p>
        </div>

        <div class="modal-body">
          <div
            id="choiceList"
            class="choice-list"
          ></div>
        </div>
      `;

      const choiceList =
        document.getElementById(
          "choiceList"
        );

      results.forEach(
        function (vehicle) {
          const button =
            document.createElement(
              "button"
            );

          button.type = "button";

          button.className =
            "choice-button";

          button.innerHTML = `
            <span class="choice-name">
              ${escapeHTML(
                getValue(
                  vehicle,
                  "Nome"
                )
              )}
            </span>

            <span class="choice-plate">
              Targa:
              ${escapeHTML(
                getValue(
                  vehicle,
                  "Targa"
                ) ||
                "non disponibile"
              )}
            </span>
          `;

          button.addEventListener(
            "click",
            function () {
              showVehicleDetails(
                vehicle
              );
            }
          );

          choiceList.appendChild(
            button
          );
        }
      );

      openModal();
    }

    function showVehicleDetails(vehicle) {
      const insurance =
        getValue(
          vehicle,
          "Assicurazione"
        );

      const inspection =
        getValue(
          vehicle,
          "Revisione"
        );

      const insuranceStatus =
        evaluateDate(insurance);

      const inspectionStatus =
        evaluateDate(inspection);

      const overallStatus =
        getOverallStatus(vehicle);

      const statusSymbol =
        overallStatus.level === "green"
          ? "✓"
          : overallStatus.level === "yellow"
            ? "!"
            : overallStatus.level === "red"
              ? "×"
              : "?";

      modalContainer.className =
        "modal " +
        overallStatus.popupClass;

      closeModalButton.style.color =
        "#ffffff";

      closeModalButton.style.background =
        "rgba(255, 255, 255, 0.22)";

      modalContent.innerHTML = `
        <div class="vehicle-popup-header">

          <h2>
            ${escapeHTML(
              getValue(
                vehicle,
                "Nome"
              )
            )}
          </h2>

          <p class="vehicle-popup-subtitle">
            Targa:
            ${escapeHTML(
              getValue(
                vehicle,
                "Targa"
              ) ||
              "non disponibile"
            )}
          </p>

          <div class="vehicle-status-summary">

            <span class="status-symbol">
              ${statusSymbol}
            </span>

            ${escapeHTML(
              overallStatus.fullLabel
            )}

          </div>

        </div>

        <div class="modal-body">

          <div class="details-grid">

            ${createDetailRow(
              "Targa",
              getValue(
                vehicle,
                "Targa"
              )
            )}

            ${createDetailRow(
              "Assicurazione",
              insurance,
              insuranceStatus.description,
              insuranceStatus.level
            )}

            ${createDetailRow(
              "Revisione",
              inspection,
              inspectionStatus.description,
              inspectionStatus.level
            )}

            ${createDetailRow(
              "Documento",
              getValue(
                vehicle,
                "Documento"
              )
            )}

            ${createDetailRow(
              "Area B & C",
              getAreaValue(vehicle)
            )}

            ${createDetailRow(
              "Note",
              getValue(
                vehicle,
                "Note"
              )
            )}

          </div>

        </div>
      `;

      openModal();
    }

    function createDetailRow(
      label,
      value,
      note = "",
      noteLevel = "neutral"
    ) {
      if (!value) {
        return "";
      }

      return `
        <div class="detail-row">

          <div class="detail-label">
            ${escapeHTML(label)}
          </div>

          <div class="detail-value">

            ${escapeHTML(value)}

            ${
              note
                ? `
                  <span
                    class="date-note ${noteLevel}"
                  >
                    ${escapeHTML(note)}
                  </span>
                `
                : ""
            }

          </div>

        </div>
      `;
    }

    function getOverallStatus(vehicle) {
      const insuranceStatus =
        evaluateDate(
          getValue(
            vehicle,
            "Assicurazione"
          )
        );

      const inspectionStatus =
        evaluateDate(
          getValue(
            vehicle,
            "Revisione"
          )
        );

      const statuses = [
        insuranceStatus,
        inspectionStatus
      ];

      if (
        statuses.some(
          function (status) {
            return (
              status.level === "red"
            );
          }
        )
      ) {
        return {
          level: "red",
          popupClass: "red-popup",
          shortLabel: "Scaduto",
          fullLabel:
            "Almeno una scadenza è superata"
        };
      }

      if (
        statuses.some(
          function (status) {
            return (
              status.level === "yellow"
            );
          }
        )
      ) {
        return {
          level: "yellow",
          popupClass: "yellow-popup",
          shortLabel: "In scadenza",
          fullLabel:
            "Almeno una scadenza è prossima"
        };
      }

      if (
        statuses.every(
          function (status) {
            return (
              status.level === "green"
            );
          }
        )
      ) {
        return {
          level: "green",
          popupClass: "green-popup",
          shortLabel: "Attive",
          fullLabel:
            "Assicurazione e revisione attive"
        };
      }

      return {
        level: "neutral",
        popupClass: "neutral-popup",
        shortLabel: "Da verificare",
        fullLabel:
          "Dati di scadenza da verificare"
      };
    }

    function evaluateDate(rawDate) {
      const date =
        parseDate(rawDate);

      if (!date) {
        return {
          level: "neutral",
          description:
            "Data non disponibile o non riconosciuta."
        };
      }

      const today =
        new Date();

      today.setHours(
        0,
        0,
        0,
        0
      );

      date.setHours(
        0,
        0,
        0,
        0
      );

      const differenceInDays =
        Math.ceil(
          (
            date.getTime() -
            today.getTime()
          ) /
          86400000
        );

      if (differenceInDays < 0) {
        return {
          level: "red",
          description:
            "Scaduta da " +
            Math.abs(
              differenceInDays
            ) +
            " giorni."
        };
      }

      if (
        differenceInDays <=
        WARNING_DAYS
      ) {
        return {
          level: "yellow",
          description:
            differenceInDays === 0
              ? "Scade oggi."
              : "In scadenza tra " +
                differenceInDays +
                " giorni."
        };
      }

      return {
        level: "green",
        description:
          "Attiva. Scade tra " +
          differenceInDays +
          " giorni."
      };
    }

    function parseDate(value) {
      if (!value) {
        return null;
      }

      const text =
        String(value).trim();

      const italianMatch =
        text.match(
          /^(\d{1,2})[./-](\d{1,2})[./-](\d{4})$/
        );

      if (italianMatch) {
        const day =
          Number(
            italianMatch[1]
          );

        const month =
          Number(
            italianMatch[2]
          );

        const year =
          Number(
            italianMatch[3]
          );

        const date =
          new Date(
            year,
            month - 1,
            day
          );

        if (
          date.getFullYear() === year &&
          date.getMonth() ===
            month - 1 &&
          date.getDate() === day
        ) {
          return date;
        }
      }

      const automaticDate =
        new Date(text);

      if (
        !Number.isNaN(
          automaticDate.getTime()
        )
      ) {
        return automaticDate;
      }

      return null;
    }

    function getValue(
      vehicle,
      requestedKey
    ) {
      const normalizedRequestedKey =
        normalizeHeader(
          requestedKey
        );

      const realKey =
        Object.keys(
          vehicle
        ).find(
          function (key) {
            return (
              normalizeHeader(key) ===
              normalizedRequestedKey
            );
          }
        );

      return realKey
        ? vehicle[realKey]
        : "";
    }

    function getAreaValue(vehicle) {
      const possibleNames = [
        "Area B & C",
        "Area B&C",
        "Area B e C",
        "Area B C"
      ];

      for (
        let index = 0;
        index <
        possibleNames.length;
        index++
      ) {
        const value =
          getValue(
            vehicle,
            possibleNames[index]
          );

        if (value) {
          return value;
        }
      }

      return "";
    }

    function cleanHeader(value) {
      return String(
        value || ""
      )
        .replace(
          /^\uFEFF/,
          ""
        )
        .trim();
    }

    function normalizeHeader(value) {
      return normalizeText(value)
        .replace(
          /\s+/g,
          ""
        );
    }

    function normalizeText(value) {
      return String(
        value || ""
      )
        .normalize("NFD")
        .replace(
          /[\u0300-\u036f]/g,
          ""
        )
        .toLowerCase()
        .replace(
          /[^a-z0-9]+/g,
          " "
        )
        .replace(
          /\s+/g,
          " "
        )
        .trim();
    }

    function parseCSV(csvText) {
      const rows = [];

      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (
        let index = 0;
        index <
        csvText.length;
        index++
      ) {
        const character =
          csvText[index];

        const nextCharacter =
          csvText[index + 1];

        if (
          character === '"' &&
          insideQuotes &&
          nextCharacter === '"'
        ) {
          cell += '"';
          index++;
        } else if (
          character === '"'
        ) {
          insideQuotes =
            !insideQuotes;
        } else if (
          character === "," &&
          !insideQuotes
        ) {
          row.push(cell);
          cell = "";
        } else if (
          (
            character === "\n" ||
            character === "\r"
          ) &&
          !insideQuotes
        ) {
          if (
            character === "\r" &&
            nextCharacter === "\n"
          ) {
            index++;
          }

          row.push(cell);

          if (
            row.some(
              function (value) {
                return (
                  String(
                    value || ""
                  ).trim() !== ""
                );
              }
            )
          ) {
            rows.push(row);
          }

          row = [];
          cell = "";
        } else {
          cell += character;
        }
      }

      if (
        cell !== "" ||
        row.length > 0
      ) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function openModal() {
      modalOverlay.classList.add(
        "open"
      );

      document.body.style.overflow =
        "hidden";
    }

    function closeModal() {
      modalOverlay.classList.remove(
        "open"
      );

      document.body.style.overflow =
        "";
    }

    function showError(text) {
      message.className =
        "message error";

      message.textContent =
        text;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll(
          "&",
          "&amp;"
        )
        .replaceAll(
          "<",
          "&lt;"
        )
        .replaceAll(
          ">",
          "&gt;"
        )
        .replaceAll(
          '"',
          "&quot;"
        )
        .replaceAll(
          "'",
          "&#039;"
        );
    }
  </script>
